name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            build_script: ./build.sh
            package_name: mikrotik-config-generator-linux.tar.gz
          - os: macos-latest
            label: macOS
            build_script: ./build-macos.sh
            package_name: mikrotik-config-generator-macos.zip
          - os: windows-latest
            label: Windows
            build_script: .\build.bat
            package_name: mikrotik-config-generator-windows.zip

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify Tkinter
        run: python -c "import tkinter; print('Tkinter OK')"

      - name: Build application
        run: ${{ matrix.build_script }}

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-assets
          tar -C dist -czf "release-assets/${{ matrix.package_name }}" "MikroTik Config Generator"

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: |
          mkdir -p release-assets
          cd dist
          zip -r "../release-assets/${{ matrix.package_name }}" "MikroTik Config Generator"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "dist/MikroTik Config Generator.exe" -DestinationPath "release-assets/${{ matrix.package_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: release-assets/${{ matrix.package_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload asset to GitHub Release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PACKAGE_NAME: ${{ matrix.package_name }}
        run: |
          gh release upload "${RELEASE_TAG}" "release-assets/${PACKAGE_NAME}" --clobber
