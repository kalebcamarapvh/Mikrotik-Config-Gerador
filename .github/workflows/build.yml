name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            build_script: ./build.sh
            package_dir: packages/linux
            package_name: mikrotik-config-generator-linux.tar.gz
          - os: windows-latest
            label: Windows
            build_script: .\build.bat
            package_dir: packages/windows
            package_name: mikrotik-config-generator-windows.zip

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify Tkinter
        run: python -c "import tkinter; print('Tkinter OK')"

      - name: Build application
        run: ${{ matrix.build_script }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: ${{ matrix.package_dir }}/${{ matrix.package_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ matrix.package_name }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
            gh release view "${RELEASE_TAG}" >/dev/null 2>&1 || \
              gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes "Release ${RELEASE_TAG}"
          fi

          gh release upload "${RELEASE_TAG}" "${{ matrix.package_dir }}/${PACKAGE_NAME}" --clobber
